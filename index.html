<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.login{
background:white;
padding:40px;
border-radius:15px;
width:300px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 25px;
border:none;
background:#667eea;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h2>My Memory</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="jacky" && p=="1234"){
window.location="timeline.html"
}else{
alert("Wrong password")
}

}

</script>

</body>
</html>
