<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>My First Website</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.card{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
opacity:0.9;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
background:white;
color:#764ba2;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h1>Hello 👋</h1>

<p>This is my first website hosted on GitHub Pages.</p>

<button onclick="alert('Welcome to my website!')">
Click Me
</button>

</div>

</body>
</html>
